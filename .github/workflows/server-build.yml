name: Build And Deploy Extension Backend Server

on:
  push:
    branches: [main]
    paths:
      - "server/**"
      - "scripts/deploy-dev-server.sh"
      - "scripts/deploy-cloudflared.sh"
      - "docker-compose.yml"
      - ".github/workflows/server-build.yml"
  workflow_dispatch:

jobs:
  server-build:
    runs-on: self-hosted
    environment: development

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: server/go.mod

      - name: Run Go tests
        working-directory: server
        run: go test ./...

      - name: Build server binary
        working-directory: server
        run: |
          mkdir -p ../artifacts
          go build -o ../artifacts/sally-server ./cmd/sally-server

      - name: Detect Docker usability
        id: docker
        run: |
          if docker run --rm hello-world >/dev/null 2>&1; then
            echo "usable=true" >> "$GITHUB_OUTPUT"
          else
            echo "usable=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Build server image
        if: steps.docker.outputs.usable == 'true'
        working-directory: server
        run: docker build -t sally-server:dev .

      - name: Save image tarball
        if: steps.docker.outputs.usable == 'true'
        run: docker save sally-server:dev -o artifacts/sally-server-dev.tar

      - name: Upload server artifacts
        uses: actions/upload-artifact@v4
        with:
          name: sally-server-dev
          path: artifacts/

      - name: Deploy server directly on runner host
        env:
          LLM_PROVIDER: ${{ vars.LLM_PROVIDER }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: ${{ vars.OPENAI_MODEL }}
          OLLAMA_BASE_URL: ${{ vars.OLLAMA_BASE_URL }}
          OLLAMA_MODEL: ${{ vars.OLLAMA_MODEL }}
          PORT: ${{ vars.SALLY_SERVER_PORT }}
          DEPLOY_ROOT: ${{ vars.SALLY_SERVER_DEPLOY_ROOT }}
        run: |
          chmod +x scripts/deploy-dev-server.sh
          ./scripts/deploy-dev-server.sh

      - name: Ensure Cloudflare tunnel is running
        env:
          CLOUDFLARED_TUNNEL_TOKEN: ${{ secrets.CLOUDFLARED_TUNNEL_TOKEN }}
        run: |
          if [ -n "$CLOUDFLARED_TUNNEL_TOKEN" ]; then
            chmod +x scripts/deploy-cloudflared.sh
            ./scripts/deploy-cloudflared.sh
          else
            echo "CLOUDFLARED_TUNNEL_TOKEN is not configured; skipping tunnel deploy"
          fi
