name: Server Build

on:
  push:
    branches: [main]
    paths:
      - "server/**"
      - "infra/dev-server/**"
      - "docker-compose.yml"
      - ".github/workflows/server-build.yml"
  pull_request:
    paths:
      - "server/**"
      - "infra/dev-server/**"
      - "docker-compose.yml"
      - ".github/workflows/server-build.yml"
  workflow_dispatch:

jobs:
  server-build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: server/go.mod

      - name: Run Go tests
        working-directory: server
        run: go test ./...

      - name: Check dev-server shell scripts
        run: |
          bash -n infra/dev-server/scripts/inspect-proxmox-nodes.sh
          bash -n infra/dev-server/scripts/create-proxmox-vm.sh
          bash -n infra/dev-server/scripts/bootstrap-guest.sh
          bash -n infra/dev-server/templates/deploy-sally-dev.sh

      - name: Validate dev-server Compose file
        env:
          POSTGRES_PASSWORD: ci_postgres_password
          CLOUDFLARED_TUNNEL_TOKEN: ci_tunnel_token
        run: docker compose --env-file infra/dev-server/env.example -f infra/dev-server/templates/docker-compose.sally-dev.yml config >/tmp/sally-dev-compose.yml

      - name: Build server image
        working-directory: server
        run: docker build -t sally-server:ci .
