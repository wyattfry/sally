name: Build and Release Chrome Extension

on:
  push:
    branches: [main]
    paths-ignore:
      - "homepage/**"
      - ".github/workflows/homepage-pages.yml"

  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    environment: development
    env:
      VITE_SALLY_BACKEND_BASE_URL: ${{ vars.VITE_SALLY_BACKEND_BASE_URL }}
      VITE_SALLY_ALLOW_MOCK_FALLBACK: "false"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - name: Configure git user
        run: |
          git config user.name "GitHub Actions"
          git config user.email "wyattfry@gmail.com"

      - run: npm run build && ./scripts/increment-manifest-version.js && git add ./public/manifest.json && git commit -m "Version update [skip actions]" && git push

      - name: Zip extension
        run: |
          FILENAME="sally-$(date +%Y-%m-%d)-${GITHUB_SHA::7}.zip"
          echo "FILENAME=$FILENAME" >> $GITHUB_ENV
          cd dist && zip -r "../$FILENAME" . && cd ..

      - name: Publish latest release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release delete latest --yes 2>/dev/null || true
          gh release create latest \
            --title "Latest Build ($(date +%Y-%m-%d))" \
            --notes "## Install instructions

          1. Download **$FILENAME** below
          2. Unzip it anywhere (e.g. your Downloads folder)
          3. Open Chrome and go to \`chrome://extensions\`
          4. Toggle on **Developer mode** (top-right corner)
          5. Click **Load unpacked** and select the unzipped folder
          6. The extension is installed — repeat steps 3-5 to update it" \
            --prerelease \
            "$FILENAME"

      - name: Upload & release
        uses: mnao305/chrome-extension-upload@v6.0.0
        with:
          file-path: sally-extension.zip
          extension-id: cpjlofdhdfpmbcmjbpipdfjjhhiohcac
          client-id: ${{ vars.CLIENT_ID }}
          client-secret: ${{ secrets.CLIENT_SECRET }}
          refresh-token: ${{ vars.REFRESH_TOKEN }}
