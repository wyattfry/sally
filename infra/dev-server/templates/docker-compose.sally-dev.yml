services:
  postgres:
    image: postgres:17-alpine
    container_name: sally-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-sally}
      POSTGRES_USER: ${POSTGRES_USER:-sally}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - sally-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-sally} -d ${POSTGRES_DB:-sally}"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  sally-server:
    build:
      context: ../../../server
      dockerfile: Dockerfile
    container_name: sally-server
    env_file:
      - path: ../../../.env
        required: false
    environment:
      PORT: ${PORT:-8080}
      DATABASE_URL: postgres://${POSTGRES_USER:-sally}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-sally}?sslmode=disable
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "127.0.0.1:${PORT:-8080}:${PORT:-8080}"
    volumes:
      - sally-uploads:/app/uploads
    restart: unless-stopped

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: sally-cloudflared
    command: tunnel --no-autoupdate run --token ${CLOUDFLARED_TUNNEL_TOKEN:?CLOUDFLARED_TUNNEL_TOKEN is required}
    network_mode: host
    depends_on:
      - sally-server
    restart: unless-stopped

  # Netdata: host-metrics dashboard at http://localhost:19999
  # Access via SSH tunnel: ssh -L 19999:localhost:19999 <your-server>
  netdata:
    image: netdata/netdata:stable
    container_name: sally-netdata
    pid: host
    network_mode: host
    cap_add:
      - SYS_PTRACE
      - SYS_ADMIN
    security_opt:
      - apparmor:unconfined
    volumes:
      - netdata-config:/etc/netdata
      - netdata-lib:/var/lib/netdata
      - netdata-cache:/var/cache/netdata
      - /etc/passwd:/host/etc/passwd:ro
      - /etc/group:/host/etc/group:ro
      - /etc/localtime:/etc/localtime:ro
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /etc/os-release:/host/etc/os-release:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    restart: unless-stopped

volumes:
  sally-postgres-data:
  sally-uploads:
  netdata-config:
  netdata-lib:
  netdata-cache:
