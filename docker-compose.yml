services:
  postgres:
    image: postgres:17-alpine
    container_name: sally-postgres
    environment:
      POSTGRES_DB: sally
      POSTGRES_USER: sally
      POSTGRES_PASSWORD: sally_dev_password
    ports:
      - "5432:5432"
    volumes:
      - sally-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sally -d sally"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  sally-server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: sally-server
    env_file:
      - path: .env
        required: false
      - path: server/.env
        required: false
    environment:
      DATABASE_URL: postgres://sally:sally_dev_password@postgres:5432/sally?sslmode=disable
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  # Netdata: host-metrics dashboard at http://localhost:19999
  netdata:
    image: netdata/netdata:stable
    container_name: sally-netdata
    pid: host
    network_mode: host
    cap_add:
      - SYS_PTRACE
      - SYS_ADMIN
    security_opt:
      - apparmor:unconfined
    volumes:
      - netdata-config:/etc/netdata
      - netdata-lib:/var/lib/netdata
      - netdata-cache:/var/cache/netdata
      - /etc/passwd:/host/etc/passwd:ro
      - /etc/group:/host/etc/group:ro
      - /etc/localtime:/etc/localtime:ro
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /etc/os-release:/host/etc/os-release:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    restart: unless-stopped

volumes:
  sally-postgres-data:
  netdata-config:
  netdata-lib:
  netdata-cache:
