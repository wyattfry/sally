version: "2"
sql:
  - engine: "postgresql"
    schema: "migrations"
    queries: "internal/db/queries"
    gen:
      go:
        package: "generated"
        out: "internal/db/generated"
        sql_package: "database/sql"
        emit_json_tags: true
        overrides:
          - db_type: "uuid"
            go_type: "string"
          - db_type: "jsonb"
            go_type: "encoding/json.RawMessage"
